services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fishflow
      POSTGRES_USER: fishflow
      POSTGRES_PASSWORD: fishflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://fishflow:fishflow@postgres:5432/fishflow
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: ..
      dockerfile: deploy/docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://fishflow:fishflow@postgres:5432/fishflow
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - postgres
      - redis

  admin-web:
    build:
      context: ..
      dockerfile: deploy/docker/admin-web.Dockerfile
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
